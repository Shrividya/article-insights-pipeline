# ---------------------------------------------------------------------------
# Generate and encode values before applying:
#
#   Fernet key:
#     python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())" | base64
#
#   Secret key:
#     python -c "import secrets; print(secrets.token_hex(32))" | base64
#
#   Postgres password:
#     echo -n "your-password" | base64
#
#   Admin password:
#     echo -n "your-password" | base64
#
#   DB connection strings (replace YOUR_PASSWORD with your actual password first):
#     echo -n "postgresql+psycopg2://medium_pipeline:YOUR_PASSWORD@airflow-postgres:5432/medium_pipeline" | base64
#     echo -n "db+postgresql://medium_pipeline:YOUR_PASSWORD@airflow-postgres:5432/medium_pipeline" | base64
#
# Replace ALL placeholder strings below with your base64-encoded output.
# ---------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: airflow-secrets
  namespace: airflow
type: Opaque
data:
  AIRFLOW__CORE__FERNET_KEY: "<base64-encoded-fernet-key>"
  AIRFLOW__CORE__INTERNAL_API_SECRET: "<base64-encoded-secret-key>"
  POSTGRES_PASSWORD: "<base64-encoded-postgres-password>"
  AIRFLOW_ADMIN_PASSWORD: "<base64-encoded-admin-password>"
  # FIX: Moved DB credentials here from configmap.yaml to avoid plaintext exposure
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: "<base64-encoded-sql-alchemy-conn>"
  AIRFLOW__CELERY__RESULT_BACKEND: "<base64-encoded-celery-result-backend>"
